name: lumos_client
description: "Lumos 契光鉴微 - AI 合同风险排查助手"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # 路由管理
  go_router: ^14.8.1

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 网络请求
  dio: ^5.8.0

  # Google Fonts
  google_fonts: ^6.2.1

  # 图标库
  flutter_svg: ^2.0.17
  lucide_icons: ^0.257.0

  # 动画库
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.15

flutter:
  uses-material-design: true

  assets:
    - assets/images/
